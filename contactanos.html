<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyShop - Contáctanos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                TrendyShop
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="quienes-somos.html">Quiénes Somos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="contactanos.html">Contáctanos</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Encabezado -->
    <section class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1>Contáctanos</h1>
            <p class="lead">
                Estamos aquí para ayudarte.
            </p>
        </div>
    </section>

    <!-- Formulario -->
    <section class="container my-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow p-4">

                    <h2 class="text-center mb-4">
                        Envíanos un mensaje
                    </h2>

                    <form id="formContacto">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea id="mensaje" rows="5" class="form-control"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Enviar Mensaje
                        </button>

                    </form>

                    <div id="respuesta" class="mt-3 text-center"></div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
        <p class="mb-0">
            © 2026 TrendyShop - Todos los derechos reservados
        </p>
    </footer>

    <script>
        const formulario = document.getElementById("formContacto");
        const respuesta = document.getElementById("respuesta");

        formulario.addEventListener("submit", function(e) {
            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const email = document.getElementById("email").value.trim();
            const mensaje = document.getElementById("mensaje").value.trim();

            if(nombre === "" || email === "" || mensaje === ""){
                respuesta.innerHTML =
                '<div class="alert alert-danger">Todos los campos son obligatorios.</div>';
                return;
            }

            respuesta.innerHTML =
            '<div class="alert alert-success">Mensaje enviado correctamente. ¡Gracias por contactarnos!</div>';

            formulario.reset();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
