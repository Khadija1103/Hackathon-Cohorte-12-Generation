      rel="stylesheet"
    />

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html"> TrendyShop </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="quienes-somos.html">Quiénes Somos</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="contactanos.html">Contáctanos</a>
            </li>
            <li class="nav-item">

                🛒 Carrito (<span id="contador-carrito">0</span>)
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Encabezado -->
    <header class="b text-white text-center py-5">
      <div class="container">
        <h1>Contáctanos</h1>
        <p class="lead">Estamos aquí para ayudarte.</p>
      </div>
    </header>
    <main>
      <!-- Formulario -->
      <section class="container my-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="card shadow p-4">
              <h2 class="text-center mb-4">Envíanos un mensaje</h2>

              <form id="formContacto">
                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input type="text" id="nombre" class="form-control" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Correo Electrónico</label>
                  <input type="email" id="email" class="form-control" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Mensaje</label>
                  <textarea
                    id="mensaje"
                    rows="5"
                    class="form-control"
                  ></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Enviar Mensaje
                </button>
              </form>

              <div id="respuesta" class="mt-3 text-center"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-5 pb-4">
      <div class="container text-center">
        <p
          class="mb-3 text-uppercase fw-bold small"
          style="color: #0d6efd; letter-spacing: 1.5px"
        >
          ✨ Creado por el equipo 2
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
          <span
            class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50"
            >Lucia Cantillo</span
          >
          <span
            class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50"
            >Miguel Saldaña</span
          >
          <span
            class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50"
            >Tatiana Jiménez</span
          >
          <span
            class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50"
            >Armando Mora</span
          >
          <span
            class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50"
            >Juan Oviedo</span
          >
        </div>

        <hr
          class="border-secondary opacity-25 my-3"
          style="max-width: 600px; margin: 0 auto"
        />

        <p class="mb-0 text-muted small">
          © 2026 TrendyShop — Generation Java Corte 12
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
