<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LOGO MENU -->
<div class="logo-boton" onclick="toggleMenu(event)">
    <img src="assets/images/logo.png" alt="logo">
</div>

<!-- MENU -->
<div id="menuDesplegable" class="menu">

    <a href="index.html">🏠 Inicio</a>
    <a href="quienes-somos.html">👥 Quiénes Somos</a>
    <a href="contactanos.html">📩 Contáctanos</a>
    <a href="carrito.html">🛒 Carrito</a>

    <a href="inicio.html" id="login">🔑 Iniciar Sesión</a>
    <a href="registro.html" id="registro">📝 Registrarse</a>
    <a href="perfil.html" id="perfil" style="display:none;">👤 Perfil</a>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleMenu(event)"></div>

<!-- HEADER -->
<header class="text-center py-5 bg-primary text-white">
    <h1>TrendyShop</h1>
    <p>Moda y estilo para todos</p>
</header>

<!-- PRODUCTOS -->
<section class="container my-5">

    <h2 class="text-center mb-4">Productos</h2>

    <div class="row" id="contenedor-productos"></div>

</section>

<!-- CARRITO -->
<section class="container mb-5">

    <div class="card p-3 shadow">

        <h3>🛒 Carrito</h3>

        <div id="contenedor-carrito"></div>

        <hr>

        <p>Total: <b id="total">$0</b></p>

        <p>Cantidad: <b id="contador-carrito">0</b></p>

    </div>

</section>

<!-- FOOTER -->
<footer class="text-center bg-dark text-white py-3">
    <p class="mb-0">© 2026 TrendyShop</p>
</footer>

<!-- SCRIPTS -->
<script src="js/productos.js"></script>
<script src="js/carrito.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
