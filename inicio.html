<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TrendyShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">

        <h2 class="auth-title">Iniciar Sesión</h2>

        <form id="loginForm">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" id="loginEmail" required>
            </div>

            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" class="form-control" id="loginPassword" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">
                Entrar
            </button>

            <p class="text-center mt-3">
                ¿No tienes cuenta?
                <a href="registro.html">Regístrate</a>
            </p>

        </form>

    </div>

    <footer class="bg-dark text-white pt-5 pb-4">
        <div class="container text-center">

            <p class="mb-3 text-uppercase fw-bold small" style="color: #0d6efd; letter-spacing: 1.5px;">
                ✨ Creado por el equipo 2
            </p>

            <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
                <span
                    class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50">Lucia
                    Cantillo</span>
                <span
                    class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50">Miguel
                    Saldaña</span>
                <span
                    class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50">Tatiana
                    Jiménez</span>
                <span
                    class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50">Armando
                    Mora</span>
                <span
                    class="badge rounded-pill bg-light text-dark px-3 py-2 border border-secondary border-opacity-50">Juan
                    Oviedo</span>
            </div>

            <hr class="border-secondary opacity-25 my-3" style="max-width: 600px; margin: 0 auto;">

            <p class="mb-0 text-muted small">
                © 2026 TrendyShop — Generation Java Corte 12
            </p>
        </div>
    </footer>

    <script src="js/auth.js"></script>

</body>

</html>
